<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nav Server 管理</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0f0f13; color: #e4e4e7; min-height: 100vh; display: flex;
    align-items: center; justify-content: center; line-height: 1.6;
  }
  .card {
    background: #18181b; border: 1px solid #27272a; border-radius: 12px;
    padding: 40px; width: 440px; max-width: 94vw;
    box-shadow: 0 25px 50px rgba(0,0,0,.4);
  }
  h1 { font-size: 20px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
  .subtitle { color: #a1a1aa; font-size: 13px; margin-bottom: 24px; margin-top: 4px; }
  label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 6px; color: #d4d4d8; }
  input[type="text"], input[type="password"] {
    width: 100%; padding: 10px 14px; border-radius: 8px; border: 1px solid #3f3f46;
    background: #09090b; color: #e4e4e7; font-size: 14px; outline: none;
    transition: border-color .15s;
  }
  input:focus { border-color: #6366f1; }
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    width: 100%; padding: 10px 20px; border-radius: 8px; font-size: 14px; font-weight: 500;
    cursor: pointer; border: none; transition: all .15s; margin-top: 12px;
  }
  .btn-primary { background: #6366f1; color: #fff; }
  .btn-primary:hover { background: #5558e6; }
  .btn-danger { background: #dc2626; color: #fff; }
  .btn-danger:hover { background: #b91c1c; }
  .btn-outline { background: none; border: 1px solid #3f3f46; color: #e4e4e7; }
  .btn-outline:hover { background: #27272a; }
  .btn-sm { padding: 6px 12px; font-size: 12px; width: auto; margin: 0; }
  .btn:disabled { opacity: .5; cursor: not-allowed; }
  .token-box {
    background: #09090b; border: 1px solid #3f3f46; border-radius: 8px;
    padding: 14px; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 13px;
    word-break: break-all; margin: 8px 0 16px; color: #a5b4fc; line-height: 1.5;
    position: relative;
  }
  .token-box .copy-btn {
    position: absolute; top: 8px; right: 8px; background: #27272a; border: none;
    color: #a1a1aa; cursor: pointer; padding: 4px 8px; border-radius: 4px; font-size: 11px;
  }
  .token-box .copy-btn:hover { background: #3f3f46; color: #e4e4e7; }
  .alert {
    background: rgba(234,179,8,.1); border: 1px solid rgba(234,179,8,.3); border-radius: 8px;
    padding: 12px 14px; font-size: 12px; color: #fbbf24; margin: 16px 0;
  }
  .alert-danger { background: rgba(239,68,68,.1); border-color: rgba(239,68,68,.3); color: #f87171; }
  .alert-success { background: rgba(34,197,94,.1); border-color: rgba(34,197,94,.3); color: #4ade80; }
  .spinner {
    display: inline-block; width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,.2); border-top-color: #fff;
    border-radius: 50%; animation: spin .6s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .hidden { display: none !important; }
  .info-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #27272a; font-size: 13px; }
  .info-label { color: #a1a1aa; }
  .badge-green { background: rgba(34,197,94,.15); color: #4ade80; padding: 2px 8px; border-radius: 999px; font-size: 11px; }
  .mt-2 { margin-top: 12px; } .mt-4 { margin-top: 24px; } .mb-2 { margin-bottom: 8px; }
  .flex { display: flex; } .gap-2 { gap: 8px; }
  .step { background: #27272a; border-radius: 999px; padding: 2px 10px; font-size: 11px; font-weight: 600; color: #a1a1aa; }
</style>
</head>
<body>
<div class="card" id="app">
  <div id="content"></div>
</div>

<script>
const API = '/api/v1/auth';

async function req(method, path, body) {
  const res = await fetch(`${API}${path}`, {
    method,
    headers: body ? { 'Content-Type': 'application/json' } : {},
    body: body ? JSON.stringify(body) : undefined,
  });
  const data = await res.json().catch(() => ({}));
  return { ok: res.ok, status: res.status, data };
}

function $(id) { return document.getElementById(id); }

// ===== 页面渲染 =====

function renderSetup() {
  $('content').innerHTML = `
    <h1>⚙️ Nav Server</h1>
    <div class="subtitle">首次配置</div>
    <p style="font-size:13px;color:#a1a1aa;margin-bottom:16px;">
      设置管理员密码并生成 API 令牌。前端连接后端需要用到此令牌。
    </p>
    <label>管理员密码</label>
    <input type="password" id="pw1" placeholder="至少 6 位" autocomplete="new-password">
    <label class="mt-2">确认密码</label>
    <input type="password" id="pw2" placeholder="再次输入" autocomplete="new-password">
    <div class="alert" style="margin-top:20px">
      设置后系统将自动生成一个 API 令牌，前端通过「后端地址 + API 令牌」连接。
    </div>
    <button class="btn btn-primary" id="setupBtn">🚀 完成初始配置</button>
    <div id="setupErr" class="hidden"></div>
  `;

  $('setupBtn').onclick = async () => {
    const p1 = $('pw1').value, p2 = $('pw2').value;
    if (p1.length < 6) { $('setupErr').className = 'alert alert-danger'; $('setupErr').textContent = '密码至少 6 位'; return; }
    if (p1 !== p2) { $('setupErr').className = 'alert alert-danger'; $('setupErr').textContent = '两次密码不一致'; return; }
    const btn = $('setupBtn'); btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> 配置中...';

    const { ok, data } = await req('POST', '/setup', { password: p1 });
    if (ok) {
      renderSetupResult(data.token);
    } else {
      btn.disabled = false; btn.textContent = '🚀 完成初始配置';
      $('setupErr').className = 'alert alert-danger'; $('setupErr').textContent = data.error || '配置失败';
    }
  };
}

function renderSetupResult(token) {
  $('content').innerHTML = `
    <h1>✅ 配置完成</h1>
    <div class="subtitle">请保存下方的 API 令牌</div>
    <div class="alert alert-success">管理员密码已设置</div>
    <label>API 令牌（用于前端连接）</label>
    <div class="token-box">
      ${escapeHtml(token)}
      <button class="copy-btn" onclick="navigator.clipboard.writeText('${escapeHtml(token)}');this.textContent='已复制'">复制</button>
    </div>
    <div class="alert">⚠️ 令牌不会再次完整显示</div>
    <div style="font-size:13px;color:#a1a1aa;background:#09090b;border-radius:8px;padding:14px;margin:16px 0;line-height:1.8">
      <strong>前端连接方式：</strong><br>
      1. 在导航页设置 → 云同步 → 选择「本地服务器」<br>
      2. 后端地址填入 <code style="background:#27272a;padding:1px 6px;border-radius:4px">http://你的IP:3001</code><br>
      3. API 令牌填入上方的密钥<br>
      4. 点击保存，数据将持久化到本地 SQLite
    </div>
    <button class="btn btn-primary" onclick="location.reload()">进入管理面板 →</button>
  `;
}

function renderLogin() {
  $('content').innerHTML = `
    <h1>🔑 Nav Server</h1>
    <div class="subtitle">管理员登录</div>
    <label>管理员密码</label>
    <input type="password" id="loginPw" placeholder="输入管理员密码" autocomplete="current-password">
    <button class="btn btn-primary" id="loginBtn">登录</button>
    <div id="loginErr" class="hidden" style="margin-top:12px;color:#f87171;font-size:13px;"></div>
  `;
  $('loginBtn').onclick = doLogin;
  $('loginPw').onkeydown = e => { if (e.key === 'Enter') doLogin(); };
}

async function doLogin() {
  const pw = $('loginPw').value;
  if (!pw) return;
  const btn = $('loginBtn'); btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> 登录中...';
  const { ok, data } = await req('POST', '/login', { password: pw });
  if (ok) { location.reload(); }
  else {
    btn.disabled = false; btn.textContent = '登录';
    $('loginErr').className = ''; $('loginErr').textContent = data.error === '密码错误' ? '密码错误' : (data.error || '登录失败');
  }
}

function renderDashboard(token) {
  $('content').innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:flex-start">
      <div>
        <h1>⚙️ Nav Server</h1>
        <div class="subtitle" style="margin-bottom:0">管理面板</div>
      </div>
      <button class="btn btn-outline btn-sm" onclick="doLogout()">退出</button>
    </div>

    <div style="background:#27272a;border-radius:8px;padding:14px;margin:20px 0 16px">
      <div class="info-row"><span class="info-label">服务状态</span><span class="badge-green">运行中</span></div>
      <div class="info-row"><span class="info-label">API 端点</span><code style="color:#a5b4fc;font-size:12px">/api/v1</code></div>
    </div>

    <label>API 令牌（前端连接用）</label>
    <div class="token-box">
      ${escapeHtml(token)}
      <button class="copy-btn" onclick="navigator.clipboard.writeText('${escapeHtml(token)}');this.textContent='已复制'">复制</button>
    </div>

    <button class="btn btn-danger" id="regenBtn">🔄 重新生成令牌</button>
    <div id="regenMsg" class="hidden"></div>
  `;

  $('regenBtn').onclick = async () => {
    if (!confirm('重新生成后，旧令牌立即失效，前端需要更新配置。确定吗？')) return;
    const btn = $('regenBtn'); btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> 生成中...';
    const { ok, data } = await req('POST', '/api-token');
    if (ok) {
      $('regenMsg').className = 'alert alert-success';
      $('regenMsg').innerHTML = `✅ 新令牌：<strong>${escapeHtml(data.token)}</strong>（已自动复制）`;
      navigator.clipboard.writeText(data.token);
      renderDashboard(data.token);
    } else {
      btn.disabled = false; btn.textContent = '🔄 重新生成令牌';
      $('regenMsg').className = 'alert alert-danger';
      $('regenMsg').textContent = data.error || '操作失败';
    }
  };
}

async function doLogout() {
  await req('POST', '/logout');
  location.reload();
}

function escapeHtml(str) {
  const d = document.createElement('div'); d.textContent = str; return d.innerHTML;
}

// ===== 启动 =====

(async () => {
  const { data } = await req('GET', '/status');

  if (data.setupRequired) {
    renderSetup();
  } else if (!data.loggedIn) {
    renderLogin();
  } else {
    const tokRes = await req('GET', '/api-token');
    renderDashboard(tokRes.data.token || '(无法获取)');
  }
})();
</script>
</body>
</html>
