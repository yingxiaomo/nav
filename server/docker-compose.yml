services:
  nav-server:
    build: .
    container_name: nav-server
    ports:
      - "8642:8642"
    environment:
      - PORT=8642
      - DATABASE_URL=/app/data/nav.db
      - UPLOAD_DIR=/app/data/uploads
      - CORS_ORIGIN=*
      # 管理员密码（不设则首次启动通过 Web 界面配置）
      # - ROOT_PASSWORD=my-secret-password
    volumes:
      # 持久化数据库和上传文件
      - nav-data:/app/data
    restart: unless-stopped

volumes:
  nav-data:
