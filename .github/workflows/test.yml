name: CI — Test & Lint

on:
  push:
    branches: [main, dev, "feat/**", "fix/**"]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".gitignore"
      - "LICENSE"
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  frontend:
    name: Frontend (Next.js)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - run: npm install
      - run: npm run lint
      - run: npm test
      - run: npx tsc --noEmit

  server:
    name: Server (Hono)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm install
      - run: npx tsc -p tsconfig.typecheck.json --noEmit
      - run: npm test
