name: Build and Push Docker Images

on:
  push:
    branches: [ "main", "dev", "feat/merge-server" ]
    tags: [ "v*" ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
      - 'LICENSE'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  all-in-one:
    name: All-in-one image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate tags
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/yingxiaomo/nav
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=,suffix=,format=short
            type=semver,pattern={{version}}
            type=ref,event=branch

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Clean up old versions
        run: |
          PACKAGE="nav"
          echo "检查 $PACKAGE 的版本..."
          VERSIONS=$(gh api "/repos/${{ github.repository }}/packages/container/$PACKAGE/versions" --jq '.[].id' 2>/dev/null || true)
          if [ -z "$VERSIONS" ]; then echo "无版本记录，跳过清理"; exit 0; fi
          COUNT=$(echo "$VERSIONS" | wc -l)
          echo "当前版本数: $COUNT"
          if [ "$COUNT" -gt 10 ]; then
            for ID in $(echo "$VERSIONS" | tail -n +11); do
              gh api -X DELETE "/repos/${{ github.repository }}/packages/container/$PACKAGE/versions/$ID" --silent 2>/dev/null || true
            done
            echo "已清理即将到期的旧版本"
          else
            echo "版本数未超限，跳过清理"
          fi

  server:
    name: Server-only image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate tags
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/yingxiaomo/nav-server
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=,suffix=,format=short
            type=semver,pattern={{version}}
            type=ref,event=branch

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ./server
          file: server/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Clean up old versions
        run: |
          PACKAGE="nav-server"
          echo "检查 $PACKAGE 的版本..."
          VERSIONS=$(gh api "/repos/${{ github.repository }}/packages/container/$PACKAGE/versions" --jq '.[].id' 2>/dev/null || true)
          if [ -z "$VERSIONS" ]; then echo "无版本记录，跳过清理"; exit 0; fi
          COUNT=$(echo "$VERSIONS" | wc -l)
          echo "当前版本数: $COUNT"
          if [ "$COUNT" -gt 10 ]; then
            for ID in $(echo "$VERSIONS" | tail -n +11); do
              gh api -X DELETE "/repos/${{ github.repository }}/packages/container/$PACKAGE/versions/$ID" --silent 2>/dev/null || true
            done
            echo "已清理即将到期的旧版本"
          else
            echo "版本数未超限，跳过清理"
          fi
