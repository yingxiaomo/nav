name: CI — Test & Lint

on:
  push:
    branches: [main, dev, "feat/**", "fix/**", "refactor/**"]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".gitignore"
      - "LICENSE"
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  frontend:
    name: Frontend (Next.js)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - run: npm install
      - run: npm run lint
      - run: npm test
      - run: npx tsc --noEmit

  server:
    name: Server (Go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - run: go build ./cmd/nav-server
      - run: go test ./...
